  <text x="400" y="215" text-anchor="middle" fill="#00d4aa" font-size="13" font-weight="bold">🔍 Example Structure</text>
  <text x="400" y="240" text-anchor="middle" fill="#94a3b8" font-size="12">🧑 "I need help with my recent purchase"</text>
  <text x="400" y="258" text-anchor="middle" fill="#94a3b8" font-size="12">🧠 "recent purchase" → order context. get_customer rejected (returns profile, no orders)</text>
  <text x="400" y="276" text-anchor="middle" fill="#00d4aa" font-size="12">🎯 Tool: lookup_order | ❌ Rejected: get_customer, cancel_order</text>

  <line x1="400" y1="280" x2="400" y2="305" stroke="#00d4aa" stroke-width="1.5"/>

