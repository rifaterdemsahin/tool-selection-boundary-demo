  <text x="400" y="330" text-anchor="middle" fill="#00d4aa" font-size="13" font-weight="bold">📊 Results</text>
  <text x="400" y="355" text-anchor="middle" fill="#94a3b8" font-size="12">💵 792 tokens/request (55% less than naive!)</text>
  <text x="400" y="375" text-anchor="middle" fill="#94a3b8" font-size="12">🎯 100% Accuracy — model correctly identifies boundary</text>
