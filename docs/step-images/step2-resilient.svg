<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Menlo, monospace">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0e1a"/><stop offset="100%" stop-color="#111827"/></linearGradient></defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="40" text-anchor="middle" fill="#00d4aa" font-size="20" font-weight="bold">✅ Resilient Approach: Boundary-Contrast Examples</text>

  <rect x="50" y="70" width="700" height="55" rx="8" fill="#1a1f35" stroke="#2a2f45"/>
  <text x="400" y="92" text-anchor="middle" fill="#00d4aa" font-size="14" font-weight="bold">🎯 6 Targeted Boundary-Contrast Examples</text>
  <text x="400" y="112" text-anchor="middle" fill="#64748b" font-size="11">Each example: utterance + reasoning + correct tool + REJECTED alternatives</text>

  <text x="400" y="152" text-anchor="middle" fill="#00d4aa" font-size="13">✅ All examples target AMBIGUOUS scenarios with BOUNDARY REASONING</text>

  <line x1="400" y1="165" x2="400" y2="190" stroke="#00d4aa" stroke-width="1.5"/>

