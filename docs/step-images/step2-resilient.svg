  <text x="400" y="440" text-anchor="middle" fill="#00d4aa" font-size="14" font-weight="bold">🟢 Correct tool on first pass!</text>

  <text x="400" y="480" text-anchor="middle" fill="#8b949e" font-size="11">⚡ Built with DeepSeek V4 Flash</text>
